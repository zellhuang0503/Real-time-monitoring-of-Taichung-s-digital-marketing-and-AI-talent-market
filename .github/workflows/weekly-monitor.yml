name: 台中中部數位人才就業市場監控

on:
  # 每月 6 號和 21 號，台北時間早上 9 點自動執行（UTC+8，換算 UTC 為凌晨 1 點）
  schedule:
    - cron: '0 1 6,21 * *'  # 每月 6 號和 21 號 UTC 01:00（台北 09:00）

  # 允許手動觸發
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    environment: "Auto run" # 綁定黃老闆設定的環境變數

    steps:
    - name: 檢出程式碼
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: 安裝相依套件
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 系統環境診斷
      run: |
        echo "執行時間: $(date)"
        python --version

    - name: 執行監控與分析 (主任務)
      run: |
        python main.py
      env:
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        LINE_USER_ID: ${{ secrets.LINE_USER_ID }}

    - name: 驗證報告生成狀態
      run: |
        if [ ! -f "report/index.html" ]; then
          echo "錯誤: 報告檔案 index.html 未生成！"
          exit 1
        fi
        echo "報告驗證成功。"

    - name: 上傳資料檔案為 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: job-data-${{ github.run_number }}
        path: |
          data/
          report/
        retention-days: 90

    - name: 設定 Git
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

    - name: 提交更新的報告到 main 分支
      run: |
        git add data/ report/
        git diff --staged --quiet || git commit -m "[Auto] 更新就業市場監控報告 - $(date +'%Y-%m-%d %H:%M:%S')"
        git pull origin main --rebase -X theirs || {
          git rebase --abort 2>/dev/null || true
          git pull origin main --no-rebase -X theirs
        }
        git push origin main
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 部署到 GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: ./report
        branch: gh-pages
        clean: false
