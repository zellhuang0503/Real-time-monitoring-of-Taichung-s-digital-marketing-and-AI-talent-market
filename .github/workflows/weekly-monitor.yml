name: 台中中部數位人才就業市場監控

on:
  # 每週二台北時間早上 9 點自動執行（UTC+8，換算 UTC 為凌晨 1 點）
  schedule:
    - cron: '0 1 * * 2'
  
  # 允許手動觸發
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
    - name: 檢出程式碼
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
        
    - name: 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: 安裝相依套件
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: 執行監控腳本
      run: |
        python main.py
        
    - name: 上傳資料檔案為 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: job-data-${{ github.run_number }}
        path: |
          data/
          report/
        retention-days: 90

    - name: 設定 Git
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

    - name: 提交更新的報告到 main 分支
      run: |
        git add data/ report/
        git diff --staged --quiet || git commit -m "[Auto] 更新就業市場監控報告 - $(date +'%Y-%m-%d %H:%M:%S')"
        git pull origin main --rebase || true
        git push origin main
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: 部署到 GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: ./report
        branch: gh-pages
        clean: false
